<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GetLiveScore™</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-inner">
      <button class="burger" id="burgerBtn" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <div class="logo">GetLiveScore<sup class="tm">™</sup></div>
      <nav class="sport-nav">
        <a class="sport-link active" href="#" id="navFootball">Football</a>
        <a class="sport-link" id="navNews" href="#">News</a>
        <a class="sport-link" id="topLeaguesLink" href="#">Competitions</a>
      </nav>
      <button class="icon-btn" id="searchBtn" aria-label="Search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- DATE STRIP -->
  <div class="date-strip">
    <button class="date-arrow" id="prevDay" aria-label="Previous day">&#8249;</button>
    <div class="date-tabs" id="dateTabs" role="tablist"></div>
    <button class="date-arrow" id="nextDay" aria-label="Next day">&#8250;</button>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <button class="filter-tab active" data-filter="all">All</button>
    <button class="filter-tab" data-filter="live">
      <span class="live-pulse"></span> Live
    </button>
    <button class="filter-tab" data-filter="finished">Finished</button>
    <button class="filter-tab" data-filter="scheduled">Upcoming</button>
  </div>

  <!-- APP LAYOUT -->
  <div class="app-layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <span class="sidebar-title">Competitions</span>
        <button class="sidebar-close-btn" id="sidebarClose">&#10005;</button>
      </div>
      <div class="sidebar-search-wrap">
        <input class="sidebar-search" id="leagueSearchInput" type="search" placeholder="Search competitions…" />
      </div>
      <div class="sidebar-list" id="sidebarList">
        <div class="sidebar-msg">Loading leagues…</div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <div class="refresh-bar">
        <span id="refreshInfo">—</span>
        <button class="refresh-btn" id="refreshBtn">&#8635; Refresh</button>
      </div>
      <div id="matchesContainer" class="matches-container">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading matches…</p>
        </div>
      </div>
    </main>
  </div>

  <!-- NEWS PAGE -->
  <div id="newsPage" style="display:none; max-width:1100px; margin:0 auto; padding:20px 14px 60px;">
    <div class="news-header">
      <h2 class="tl-title">Football News</h2>
      <div class="news-sources" id="newsSources">
        <button class="news-src-btn active" data-src="bbc">BBC Sport</button>
        <button class="news-src-btn" data-src="sky">Sky Sports</button>
        <button class="news-src-btn" data-src="guardian">The Guardian</button>
      </div>
    </div>
    <div id="newsGrid" class="news-grid">
      <div class="loading-state"><div class="spinner"></div><p>Loading news…</p></div>
    </div>
  </div>

  <!-- TOP LEAGUES PAGE -->
  <div id="topLeaguesPage" style="display:none; max-width:1100px; margin:0 auto; padding:20px 14px 60px;">
    <div class="tl-header">
      <h2 class="tl-title">Competitions</h2>
      <p class="tl-sub">Select a competition to view all teams</p>
    </div>
    <div class="tl-pills" id="tlPills"></div>
    <div id="tlTeamsSection" style="display:none;">
      <div class="tl-league-banner" id="tlBanner"></div>
      <div class="tl-teams-grid" id="tlTeamsGrid"></div>
    </div>
  </div>

  <!-- MATCH MODAL -->
  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <span id="modalTitle" class="modal-title-text"></span>
        <button class="modal-close-btn" id="modalClose">&#10005;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
